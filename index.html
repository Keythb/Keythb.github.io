html,body{margin:0;height:100%;background:#000;}
body{overflow:hidden;}
.cover{display:block;position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;cursor:pointer;text-decoration:none;background:#000;}
.scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;background:#000;transition:transform 1.5s cubic-bezier(.2,.7,.2,1);}
.cover:hover .scene{transform:scale(1.05);}
@media (max-width:820px){.scene{object-fit:contain;}}
.tagline{position:absolute;left:0;right:0;bottom:11%;text-align:center;padding:0 7vw;opacity:0;animation:rise 2.6s ease-out .5s forwards;pointer-events:none;}
.tagline p{font-family:"EB Garamond",Georgia,serif;font-style:italic;font-weight:500;font-size:clamp(1.25rem,2.7vw,2.25rem);line-height:1.5;color:#ECDAA8;margin:0;letter-spacing:.01em;text-shadow:0 2px 36px rgba(0,0,0,.9),0 0 16px rgba(0,0,0,.7);}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.tagline{animation:none;opacity:1}.cover:hover .scene{transform:none}}
</style>
</head>

<a class="cover" href="/home/" aria-label="Enter TON618 Capital">
  <picture>
    <source srcset="/assets/blackhole.webp" type="image/webp">
